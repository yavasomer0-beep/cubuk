name: Mod Derle
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: chmod +x gradlew
      - run: gradle wrapper --gradle-version 8.4
      - run: ./gradlew build
      - uses: actions/upload-artifact@v4
        with:
          name: cubukmod-jar
          path: build/libs/*.jar
