name: Mod Derle
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
      - run: gradle build
      - uses: actions/upload-artifact@v4
        with:
          name: cubukmod-jar
          path: build/libs/*.jar
